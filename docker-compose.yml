version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: python-base  # Use python-base for development
    container_name: kanban-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=sqlite:///./data/kanban.db
      - JWT_SECRET_KEY=development-secret-key-change-in-production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - backend-data:/app/data
      - backend-logs:/app/logs
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kanban-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: kanban-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev
    networks:
      - kanban-network

  # Optional Redis for caching and WebSocket pub/sub
  redis:
    image: redis:7-alpine
    container_name: kanban-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - kanban-network

volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
  redis-data:
    driver: local

networks:
  kanban-network:
    driver: bridge